[build]
  command = "npm run build"
  publish = ".output/public"

[build.environment]
  NODE_VERSION = "22"
  NITRO_PRESET = "netlify"

[build.processing]
  skip_processing = false

[build.secrets_scanning]
  omit_keys = ["SUPABASE_URL", "SUPABASE_KEY"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200
  force = false